version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medical-chatbot-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Development için hot-reload (opsiyonel)
      - ./backend/app:/app/app
      - ./backend/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: medical-chatbot-network
